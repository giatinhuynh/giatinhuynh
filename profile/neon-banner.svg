<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0a12"/>
      <stop offset="100%" style="stop-color:#1a1225"/>
    </linearGradient>
    <filter id="neon-pink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ff2a6d" flood-opacity="0.9"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#05d9e8" flood-opacity="0.85"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-pink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#ff2a6d" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="260" fill="url(#bg)"/>
  <!-- Subtle grid lines (HK city vibe) -->
  <g stroke="#1e1530" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="65" x2="900" y2="65"/>
    <line x1="0" y1="195" x2="900" y2="195"/>
  </g>
  <!-- Name: Peter/Shinya - neon pink -->
  <text x="450" y="118" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="#ff2a6d" text-anchor="middle" filter="url(#neon-pink)">Peter/Shinya</text>
  <text x="450" y="118" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="none" stroke="#ff2a6d" stroke-width="1.5" text-anchor="middle">Peter/Shinya</text>
  <!-- Subtitle: neon cyan -->
  <text x="450" y="172" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#05d9e8" text-anchor="middle" filter="url(#neon-cyan)">AI · Full-Stack · Cloud · Project Manager</text>
  <text x="450" y="172" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="none" stroke="#05d9e8" stroke-width="1" text-anchor="middle">AI · Full-Stack · Cloud · Project Manager</text>
  <!-- Decorative neon lines -->
  <line x1="180" y1="138" x2="280" y2="138" stroke="#ff2a6d" stroke-width="2" opacity="0.7"/>
  <line x1="620" y1="138" x2="720" y2="138" stroke="#ff2a6d" stroke-width="2" opacity="0.7"/>
</svg>
